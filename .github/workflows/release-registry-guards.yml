name: Release registry guards before LSP awaits

on:
  push:
    branches:
      - agent/release-registry-guards
  pull_request:
    branches:
      - main

concurrency:
  group: release-registry-guards
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.event_name == 'pull_request' || github.event.head_commit.message != 'Release registry guards before LSP awaits'
    runs-on: ubuntu-latest
    steps:
      - name: Check out source branch
        uses: actions/checkout@v4
        with:
          ref: agent/release-registry-guards
          fetch-depth: 0

      - name: Unify explicit short client snapshots
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.simplecc-release-registry-guards.py')
          text = path.read_text(encoding='utf-8')
          marker = 'primary_count, fanout_count = unwrap_registry_read_blocks()'
          insertion = '''replace_regex(
              r"""            let client = \{
                          let r = registry\.read\(\)\.await;
                          r\.as_ref\(\)
                              \.and_then\(\|reg\| reg\.client_for_filetype\(&language_id\)\)
                      \};""",
              "            let client = primary_client(&registry, &language_id).await;",
              expected=2,
          )

          primary_count, fanout_count = unwrap_registry_read_blocks()'''
          if text.count(marker) != 1:
              raise RuntimeError('could not locate registry snapshot insertion point')
          path.write_text(text.replace(marker, insertion, 1), encoding='utf-8')
          PY

      - name: Apply guarded registry lifetime transform
        id: transform
        continue-on-error: true
        run: python3 .simplecc-release-registry-guards.py > registry-transform.log 2>&1

      - name: Upload transform diagnostics
        if: steps.transform.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: registry-transform-error
          path: registry-transform.log

      - name: Stop after transform failure
        if: steps.transform.outcome == 'failure'
        run: exit 1

      - name: Verify guard lifetimes
        run: |
          grep -q 'async fn primary_client' src/simplecc/simplecc_daemon.rs
          grep -q 'async fn filetype_clients' src/simplecc/simplecc_daemon.rs
          grep -q 'registry.write().await.take()' src/simplecc/simplecc_daemon.rs
          ! grep -q 'reg.client_for_filetype(&language_id)' src/simplecc/simplecc_daemon.rs
          ! grep -q 'reg.clients_for_filetype(&ft)' src/simplecc/simplecc_daemon.rs

      - name: Format
        id: format
        continue-on-error: true
        run: cargo fmt > rustfmt.log 2>&1

      - name: Capture rustfmt context
        if: steps.format.outcome == 'failure'
        run: |
          cat rustfmt.log
          python3 - <<'PY'
          from pathlib import Path
          import re
          log = Path('rustfmt.log').read_text(encoding='utf-8')
          source = Path('src/simplecc/simplecc_daemon.rs').read_text(encoding='utf-8').splitlines()
          lines = [int(value) for value in re.findall(r'simplecc_daemon\.rs:(\d+):', log)]
          with Path('rustfmt-context.txt').open('w', encoding='utf-8') as out:
              out.write(log)
              for line in lines:
                  out.write(f'\n--- source around line {line} ---\n')
                  start = max(1, line - 12)
                  end = min(len(source), line + 12)
                  for index in range(start, end + 1):
                      out.write(f'{index:5}: {source[index - 1]}\n')
          PY

      - name: Upload rustfmt diagnostics
        if: steps.format.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: registry-rustfmt-error
          path: rustfmt-context.txt

      - name: Stop after rustfmt failure
        if: steps.format.outcome == 'failure'
        run: exit 1

      - name: Compile
        run: cargo check --message-format short

      - name: Test
        run: |
          cargo test
          git diff --check

      - name: Commit source changes and remove bootstrap files
        run: |
          rm .simplecc-release-registry-guards.py
          rm .github/workflows/release-registry-guards.yml
          rm -f registry-transform.log rustfmt.log rustfmt-context.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Release registry guards before LSP awaits'
          git push origin HEAD:agent/release-registry-guards
